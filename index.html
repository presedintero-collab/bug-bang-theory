<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BUG BANG</title>
  <meta name="description" content="BUG BANG — From the First Difference to the Geometry of Meaning.">
  <meta name="robots" content="noindex,nofollow">
  <style>
    :root{
      --night:#02040b;
      --deep:#071123;
      --blue:#59c7ff;
      --violet:#9c78ff;
      --gold:#f5d48a;
      --ivory:#f8f1df;
      --muted:#bcc9dd;
    }
    *{box-sizing:border-box}
    html{min-height:100%;background:var(--night)}
    body{
      margin:0;
      min-height:100vh;
      overflow-x:hidden;
      color:var(--ivory);
      font-family:Georgia,"Times New Roman",serif;
      background:
        radial-gradient(circle at 18% 17%,rgba(74,101,255,.22),transparent 30%),
        radial-gradient(circle at 82% 24%,rgba(168,73,255,.20),transparent 28%),
        radial-gradient(circle at 50% 78%,rgba(0,186,255,.14),transparent 34%),
        linear-gradient(180deg,#02040b 0%,#071123 52%,#02040b 100%);
    }
    body::before,
    body::after{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
    }
    body::before{
      opacity:.72;
      background-image:
        radial-gradient(circle,#fff 0 1px,transparent 1.5px),
        radial-gradient(circle,rgba(130,203,255,.9) 0 1px,transparent 1.5px),
        radial-gradient(circle,rgba(245,212,138,.8) 0 1px,transparent 1.5px);
      background-size:89px 89px,137px 137px,211px 211px;
      background-position:8px 17px,31px 61px,77px 14px;
    }
    body::after{
      background:radial-gradient(ellipse at center,transparent 45%,rgba(0,0,0,.64) 100%);
    }
    .shell{
      position:relative;
      z-index:1;
      width:min(1180px,100%);
      min-height:100vh;
      margin:auto;
      padding:28px 24px 44px;
      display:flex;
      flex-direction:column;
    }
    header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:20px;
    }
    .mark{
      color:var(--gold);
      letter-spacing:.22em;
      font-size:13px;
      font-family:Arial,sans-serif;
      text-transform:uppercase;
    }
    .lang{display:flex;gap:9px}
    .lang a{
      color:#dff4ff;
      text-decoration:none;
      border:1px solid rgba(89,199,255,.42);
      background:rgba(5,12,28,.45);
      padding:8px 13px;
      border-radius:999px;
      font:700 13px Arial,sans-serif;
      backdrop-filter:blur(8px);
    }
    .lang a[aria-current="page"]{
      color:#071123;
      background:var(--blue);
      border-color:var(--blue);
    }
    main{
      flex:1;
      display:grid;
      place-items:center;
      padding:58px 0 42px;
    }
    .hero{
      width:min(930px,100%);
      text-align:center;
      position:relative;
      padding:76px 34px 68px;
      border:1px solid rgba(173,207,255,.22);
      border-radius:34px;
      background:linear-gradient(180deg,rgba(8,16,38,.66),rgba(3,7,18,.72));
      box-shadow:
        0 30px 100px rgba(0,0,0,.52),
        inset 0 1px 0 rgba(255,255,255,.08),
        0 0 90px rgba(80,121,255,.10);
      backdrop-filter:blur(9px);
      overflow:hidden;
    }
    .hero::before{
      content:"";
      position:absolute;
      width:360px;
      height:360px;
      left:50%;
      top:44%;
      transform:translate(-50%,-50%);
      border-radius:50%;
      background:
        radial-gradient(circle at 36% 34%,rgba(255,255,255,.95) 0 1%,rgba(114,210,255,.72) 4%,rgba(84,88,255,.32) 22%,rgba(153,68,255,.15) 42%,transparent 69%);
      filter:blur(.2px);
      box-shadow:0 0 100px rgba(83,155,255,.33);
      opacity:.75;
    }
    .orbit{
      position:absolute;
      left:50%;
      top:44%;
      width:520px;
      height:190px;
      transform:translate(-50%,-50%) rotate(-12deg);
      border:1px solid rgba(89,199,255,.24);
      border-radius:50%;
      box-shadow:0 0 34px rgba(89,199,255,.08);
    }
    .orbit::after{
      content:"";
      position:absolute;
      width:8px;
      height:8px;
      right:56px;
      top:23px;
      border-radius:50%;
      background:var(--gold);
      box-shadow:0 0 18px var(--gold);
    }
    .eyebrow,
    h1,
    .subtitle,
    .divider,
    .status,
    .actions{position:relative;z-index:2}
    .eyebrow{
      margin:0 0 16px;
      color:#a8ddff;
      letter-spacing:.28em;
      text-transform:uppercase;
      font:700 12px Arial,sans-serif;
    }
    h1{
      margin:0;
      color:var(--gold);
      font-size:clamp(58px,12vw,126px);
      letter-spacing:.08em;
      line-height:.9;
      text-shadow:
        0 0 16px rgba(245,212,138,.42),
        0 0 52px rgba(95,154,255,.30);
    }
    .subtitle{
      margin:28px auto 0;
      max-width:760px;
      font-size:clamp(19px,3vw,31px);
      line-height:1.42;
      text-wrap:balance;
    }
    .divider{
      width:180px;
      height:1px;
      margin:30px auto;
      background:linear-gradient(90deg,transparent,var(--blue),var(--violet),transparent);
      box-shadow:0 0 13px rgba(89,199,255,.55);
    }
    .status{
      margin:0 auto;
      max-width:620px;
      color:var(--muted);
      font:16px/1.75 Arial,sans-serif;
    }
    .actions{
      display:flex;
      justify-content:center;
      flex-wrap:wrap;
      gap:12px;
      margin-top:30px;
    }
    .button{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:160px;
      padding:12px 20px;
      border-radius:999px;
      text-decoration:none;
      font:700 14px Arial,sans-serif;
      transition:transform .2s ease,box-shadow .2s ease;
    }
    .button.primary{
      color:#071123;
      background:linear-gradient(90deg,var(--gold),#fff0b8);
      box-shadow:0 8px 30px rgba(245,212,138,.18);
    }
    .button.secondary{
      color:#def5ff;
      border:1px solid rgba(89,199,255,.48);
      background:rgba(5,13,31,.50);
    }
    .button:hover{transform:translateY(-2px)}
    footer{
      position:relative;
      z-index:2;
      text-align:center;
      color:#8593aa;
      font:12px/1.6 Arial,sans-serif;
      letter-spacing:.08em;
    }
    @media (max-width:640px){
      .shell{padding:20px 14px 30px}
      .mark{letter-spacing:.12em;font-size:11px}
      .hero{padding:62px 18px 56px;border-radius:24px}
      .hero::before{width:250px;height:250px}
      .orbit{width:330px;height:130px}
      h1{font-size:clamp(52px,20vw,84px)}
      .subtitle{font-size:20px}
    }
    @media (prefers-reduced-motion:no-preference){
      body::before{animation:drift 42s linear infinite}
      .hero::before{animation:pulse 7s ease-in-out infinite}
      .orbit{animation:orbitGlow 9s ease-in-out infinite}
    }
    @keyframes drift{to{background-position:97px 106px,168px 198px,288px 225px}}
    @keyframes pulse{50%{transform:translate(-50%,-50%) scale(1.08);opacity:.92}}
    @keyframes orbitGlow{50%{filter:brightness(1.45)}}
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <div class="mark">The First Difference</div>
      <nav class="lang" aria-label="Language selection">
        <a href="#en" aria-current="page">EN</a>
        <a href="#ro">RO</a>
      </nav>
    </header>

    <main>
      <section class="hero" aria-labelledby="page-title">
        <div class="orbit" aria-hidden="true"></div>
        <p class="eyebrow">A conceptual genesis</p>
        <h1 id="page-title">BUG BANG</h1>
        <p class="subtitle">From the First Difference to the Geometry of Meaning</p>
        <div class="divider" aria-hidden="true"></div>
        <p class="status">The new website is being rebuilt carefully, one page at a time. This temporary preview is hidden from search engines.</p>
        <div class="actions">
          <a class="button primary" href="#concept">Enter the concept</a>
          <a class="button secondary" href="#books">Explore the books</a>
        </div>
      </section>
    </main>

    <footer>PREVIEW · BUG-BANG-THEORY.ORG</footer>
  </div>
</body>
</html>
